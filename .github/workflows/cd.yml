# ──────────────────────────────────────────────
# CD Pipeline — Deploy to Google Cloud Run
# ──────────────────────────────────────────────
# Triggers on push to main (after CI passes)
# Steps:
#   1. Run full training pipeline + tests (same as CI)
#   2. Export model
#   3. Build Docker image
#   4. Push to Artifact Registry
#   5. Deploy to Cloud Run

name: CD — Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python ──
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Install dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Create .env ──
      - name: Create .env file
        run: |
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> .env
          echo "GCP_REGION=${{ secrets.GCP_REGION }}" >> .env
          echo "ALERT_EMAIL=ci@test.com" >> .env

      # ── Run training pipeline ──
      - name: Preprocess data
        run: python src/training/preprocess.py

      - name: Train models
        run: python src/training/train.py

      - name: Evaluate and promote champion
        run: python src/training/evaluate.py

      - name: Export champion model
        run: python src/training/export_model.py

      # ── Run tests ──
      - name: Run all tests
        run: pytest tests/ -v --tb=short

      # ── Authenticate with GCP ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── Setup gcloud CLI ──
      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── Configure Docker for Artifact Registry ──
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Build Docker image ──
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stroke-mlops-repo/stroke-api:${{ github.sha }} .
          docker tag ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stroke-mlops-repo/stroke-api:${{ github.sha }} ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stroke-mlops-repo/stroke-api:latest

      # ── Push to Artifact Registry ──
      - name: Push Docker image
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stroke-mlops-repo/stroke-api:${{ github.sha }}
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stroke-mlops-repo/stroke-api:latest

      # ── Deploy to Cloud Run ──
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy stroke-api \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stroke-mlops-repo/stroke-api:${{ github.sha }} \
            --region=${{ secrets.GCP_REGION }} \
            --port=8000 \
            --allow-unauthenticated \
            --memory=1Gi \
            --max-instances=1 \
            --quiet